services:
  postgres:
    image: postgres:16
    container_name: tracenet-postgres
    environment:
      POSTGRES_USER: tracenet
      POSTGRES_PASSWORD: tracenet
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - tracenet_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracenet -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./services/auth-service
    container_name: tracenet-auth-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tracenet_auth_db
      SPRING_DATASOURCE_USERNAME: tracenet
      SPRING_DATASOURCE_PASSWORD: tracenet
      JWT_SECRET: traceNetSuperSecretKeyForDevelopmentOnlyChangeLater123456789
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  trace-ingestion-service:
    build:
      context: ./services/trace-ingestion-service
    container_name: tracenet-trace-ingestion-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tracenet_trace_db
      SPRING_DATASOURCE_USERNAME: tracenet
      SPRING_DATASOURCE_PASSWORD: tracenet
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy

  trace-query-service:
    build:
      context: ./services/trace-query-service
    container_name: tracenet-trace-query-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tracenet_trace_db
      SPRING_DATASOURCE_USERNAME: tracenet
      SPRING_DATASOURCE_PASSWORD: tracenet
    ports:
      - "8086:8086"
    depends_on:
      trace-ingestion-service:
        condition: service_started

  analytics-service:
    build:
      context: ./services/analytics-service
    container_name: tracenet-analytics-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tracenet_trace_db
      SPRING_DATASOURCE_USERNAME: tracenet
      SPRING_DATASOURCE_PASSWORD: tracenet
    ports:
      - "8087:8087"
    depends_on:
      trace-ingestion-service:
        condition: service_started

  alert-service:
    build:
      context: ./services/alert-service
    container_name: tracenet-alert-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tracenet_trace_db
      SPRING_DATASOURCE_USERNAME: tracenet
      SPRING_DATASOURCE_PASSWORD: tracenet
    ports:
      - "8088:8088"
    depends_on:
      trace-ingestion-service:
        condition: service_started

  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: tracenet-api-gateway
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      TRACE_INGESTION_SERVICE_URL: http://trace-ingestion-service:8085
      TRACE_QUERY_SERVICE_URL: http://trace-query-service:8086
      ANALYTICS_SERVICE_URL: http://analytics-service:8087
      ALERT_SERVICE_URL: http://alert-service:8088
      JWT_SECRET: traceNetSuperSecretKeyForDevelopmentOnlyChangeLater123456789
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - trace-ingestion-service
      - trace-query-service
      - analytics-service
      - alert-service

  demo-payment-service:
    build:
      context: ./services/demo-payment-service
    container_name: tracenet-demo-payment-service
    environment:
      TRACE_INGESTION_URL: http://trace-ingestion-service:8085
    ports:
      - "8083:8083"
    depends_on:
      - trace-ingestion-service

  demo-inventory-service:
    build:
      context: ./services/demo-inventory-service
    container_name: tracenet-demo-inventory-service
    environment:
      TRACE_INGESTION_URL: http://trace-ingestion-service:8085
    ports:
      - "8084:8084"
    depends_on:
      - trace-ingestion-service

  demo-order-service:
    build:
      context: ./services/demo-order-service
    container_name: tracenet-demo-order-service
    environment:
      PAYMENT_SERVICE_URL: http://demo-payment-service:8083
      INVENTORY_SERVICE_URL: http://demo-inventory-service:8084
      TRACE_INGESTION_URL: http://trace-ingestion-service:8085
    ports:
      - "8082:8082"
    depends_on:
      - demo-payment-service
      - demo-inventory-service
      - trace-ingestion-service

volumes:
  tracenet_postgres_data: