spring.application.name=auth-service
server.port=8081

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tracenet_auth_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ivanbhargava}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:traceNetSuperSecretKeyForDevelopmentOnlyChangeLater123456789}
jwt.expiration-ms=86400000

management.endpoints.web.exposure.include=health,info